    <path d="M44 74 L44 92" stroke="#F97316"/>
    <path d="M64 76 L64 92" stroke="#10B981"/>
    <path d="M84 74 L84 92" stroke="#0EA5E9"/>
  </g>
  <circle cx="44" cy="100" r="8" fill="#F97316"/>
  <circle cx="64" cy="100" r="8" fill="#10B981"/>
  <circle cx="84" cy="100" r="8" fill="#0EA5E9"/>
  <g fill="#4F46E5">
    <circle cx="42" cy="52" r="20"/>
    <circle cx="66" cy="42" r="26"/>
    <circle cx="88" cy="54" r="17"/>
    <rect x="26" y="50" width="78" height="22" rx="11"/>
  </g>
  <text x="128" y="82" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="60" font-weight="700" letter-spacing="-2" fill="#0F172A">nimbus</text>
